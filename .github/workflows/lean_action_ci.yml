name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read # Read access to repository contents
  pages: write # Write access to GitHub Pages
  id-token: write # Write access to ID tokens

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1

      # Builds only the API docs (into docs/docs); blueprint and deploy are
      # handled by the steps below, since docgen-action's own blueprint
      # builder unconditionally runs a `pip install pygraphviz` command that
      # breaks against recent pip releases (see
      # https://github.com/leanprover-community/docgen-action/blob/main/action.yml),
      # even though this project doesn't use the `dep_graph` feature that
      # pygraphviz is for.
      - uses: leanprover-community/docgen-action@v1
        with:
          blueprint: false
          deploy: false

      - name: Build blueprint
        uses: xu-cheng/texlive-action@v2
        with:
          docker_image: ghcr.io/xu-cheng/texlive-full:20250401
          run: |
            apk update
            apk add --update make py3-pip git pkgconfig
            git config --global --add safe.directory $GITHUB_WORKSPACE
            git config --global --add safe.directory `pwd`
            python3 -m venv env
            source env/bin/activate
            pip install --upgrade pip
            pip install leanblueprint
            leanblueprint pdf
            mkdir -p docs
            cp blueprint/print/print.pdf docs/blueprint.pdf
            leanblueprint web
            cp -r blueprint/web docs/blueprint

      - name: Fix ownership of blueprint output
        run: sudo chown -R "$USER" docs

      - name: Check declarations mentioned in the blueprint exist in Lean code
        run: ~/.elan/bin/lake exe checkdecls blueprint/lean_decls

      - name: Upload website (API docs + blueprint)
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push'
        uses: actions/deploy-pages@v4
