name = "WeierstrassFormalization"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["WeierstrassFormalization"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[require]]
name = "checkdecls"
scope = "PatrickMassot"

[[lean_lib]]
name = "WeierstrassFormalization"
